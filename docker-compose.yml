services:

  app:
    build:
      context: component/core
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64/v8
        - linux/riscv64
    ports:
      - "5060:5060/udp"
      - "6379:6379"
    volumes:
      - ./component/core/data:/var/lib/upbx:rw
      - ./component/core/upbx.conf:/etc/upbx.conf
    environment:
      - RTPPROXY=unix:///var/run/udphole.sock
      - API_ADMIN_USER=admin
      - API_ADMIN_PASS=supers3cret
      - LOG_LEVEL=debug
    depends_on:
      udphole:
        condition: service_healthy

  udphole:
    image: finwo/udphole:1.3.12
    ports:
      - "10000-10099:10000-10099/udp"
    environment:
      - UDP_PORTS=10000-10099
      - API_PORT=6379
      - API_ADMIN_USER=admin
      - API_ADMIN_PASS=supers3cret
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6379"]
      interval: 10s
      timeout: 5s
      retries: 3
