services:
  app:
    build:
      context: core
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64/v8
        - linux/riscv64
    ports:
      - "5060:5060/udp"
      - "6379:6379"
    volumes:
      - ./core/data:/var/lib/upbx:rw
      - ./core/config.ini:/etc/upbx.conf
    environment:
      - RTPPROXY=unix:///var/run/udphole.sock
      - API_ADMIN_USER=admin
      - API_ADMIN_PASS=supers3cret
    depends_on:
      udphole:
        condition: service_healthy

  udphole:
    image: finwo/udphole:1.3.9
    ports:
      - "7000-7999:7000-7999/udp"
    environment:
      - UDP_PORTS=7000-7999
      - API_PORT=6379
      - API_ADMIN_USER=admin
      - API_ADMIN_PASS=supers3cret
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6379"]
      interval: 10s
      timeout: 5s
      retries: 3
